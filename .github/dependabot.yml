version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: 'weekly'
    # Wait 5 days before updating to help circumvent supply chain attacks
    cooldown:
      default-days: 5
      # Exclude plugin-e2e to prevent false positives with canary e2e tests
      exclude:
        - '@grafana/plugin-e2e'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
      include: 'scope'
    ignore:
      # eslint-plugin-react@7.x is peer-capped at eslint ^9.7, so eslint 10 is
      # not installable without a forced/broken resolution. Hold eslint at 9
      # until the plugin ecosystem supports eslint 10, then remove this entry.
      - dependency-name: 'eslint'
        versions: ['>=10']
    groups:
      unit-test:
        patterns:
          - '@testing-library/*'
          - 'jest*'
          - '@types/jest'
      eslint:
        patterns:
          - '@grafana/eslint-config'
          - 'eslint*'
          - '@typescript-eslint/*'
          - '@stylistic/*'
      grafana:
        patterns:
          - '@grafana/*'
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(ci)'
    open-pull-requests-limit: 5
    ignore:
      # e2e-version v3.0.0 crashes at module load on the runner. Hold at v2
      # until a fixed v3.x ships, then remove this entry.
      - dependency-name: 'grafana/plugin-actions/e2e-version'
        versions: ['>=3']
