# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
      # Enable build provenance attestation (a verifiable supply-chain record that
      # the release zip was built from this source).
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          # Create a verifiable build provenance attestation (sigstore) so anyone
          # can confirm the zip was built from this source. Requires the
          # id-token/attestations permissions set on this job above.
          attestation: 'true'
