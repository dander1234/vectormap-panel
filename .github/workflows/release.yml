# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
      # Enable build provenance attestation (verifiable build) — addresses the
      # catalog "no-provenance-attestation" recommendation.
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.0.2
        with:
          # Create a verifiable build provenance attestation (sigstore) so the
          # catalog can confirm the zip was built from this source. Requires the
          # id-token/attestations permissions set on this job above.
          attestation: 'true'
        # Uncomment to enable plugin signing
        # (For more info on how to generate the access policy token see https://grafana.com/developers/plugin-tools/publish-a-plugin/sign-a-plugin#generate-an-access-policy-token)
        #  # Make sure to save the token in your repository secrets
        #  policy_token: $
        #  # Usage of GRAFANA_API_KEY is deprecated, prefer `policy_token` option above
        #  grafana_token: $
